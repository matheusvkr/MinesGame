<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines - Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1> ⛏️ Mines </h1>
        <div id="balance">
            <p>Saldo: R$<span id="saldo">1000.00</span></p>
        </div>
    </header>

    <div id="game">
        <div id="options">
            <h1>⛏️ Mines</h1>
            <div class="input-container">
                <div class="input-inner">
                    <label>Quantidade</label>
                    <input id="aposta" type="text" value="0,00">
                </div>
                <span>R$</span>
            </div>

            <div class="input-container">
                <div class="input-inner">
                    <label>Número de minas</label>
                    <input id="qtdminas" type="number" value="1" min="1" max="20">
                </div>
            </div>

            <button id="startBtn">Começar</button>
            <p>(Min: <span id="minValue">R$10,00</span>)</p>
        </div>

        <div id="board">
            <div id="over"></div>
        </div>
    </div>

    <footer>
        <p>© 2025 Matdev - <a href="https://github.com/matheusc9">Github</a></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
